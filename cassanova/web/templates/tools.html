{% extends "base.html" %}

{% block title %}Tools{% endblock %}

{% block body_class %}with-sidebar{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="/static/scripts/vendor/xterm/xterm.css" />
<link rel="preload" href="/static/scripts/vendor/xterm/xterm.js" as="script" />
<script src="/static/scripts/vendor/xterm/xterm.js" defer></script>
<script src="/static/scripts/vendor/xterm/xterm-addon-fit.js" defer></script>
<script type="module" src="/static/scripts/app/tools.js" defer></script>
{% endblock %}
{% block content %}
<main class="with-sidebar">
    <div id="xterm-upload">
        <label for="files-input">Upload Files or Folder (optional)</label>
        <input type="file" id="files-input" multiple webkitdirectory directory />
        <small class="note">Select multiple files or a folder to send with your commands.</small>
    </div>
    <div id="xterm-wrapper">
        <div id="xterm-container"></div>
    </div>
</main>

{% endblock %}
