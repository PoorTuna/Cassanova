image:
  repository: poortuna/cassanova
  tag: "dev"
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 8080

serviceAccount:
  create: true
  rbac:
    create: true
    clusterWide: true

config:
  appConfig:
    host: "0.0.0.0"
    port: 8080
    routers:
      - cassanova_ui_router
      - cassanova_api_router

  auth:
    enabled: false

  clusters: {}

  k8s:
    enabled: true
    namespace: "k8ssandra-operator"
    suffix: "-lb"
    periodicDiscoveryEnabled: true
    discoveryIntervalSeconds: 30
    externalOnly: true
    staleThreshold: 3
