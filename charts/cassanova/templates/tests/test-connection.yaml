apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "cassanova.fullname" . }}-test-connection"
  labels:
    {{- include "cassanova.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['--spider', '--timeout=5', 'http://{{ include "cassanova.fullname" . }}:{{ .Values.service.port }}/']
  restartPolicy: Never
